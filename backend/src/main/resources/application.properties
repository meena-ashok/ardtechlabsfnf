# Server
server.port=8080

# H2 Database (dev profile)
spring.datasource.url=jdbc:h2:mem:ardtechlabs
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
app.jwt.secret=ardtechlabs-secret-key-change-in-production-minimum-256-bits-long-key
app.jwt.expiration-ms=86400000

# Admin defaults
app.admin.email=admin@ardtechlabs.com
app.admin.password=admin123

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,https://humble-guide-x9vw55rpv5g36pq5-5173.app.github.dev
