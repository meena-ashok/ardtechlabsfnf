# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/ardtechlabs
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
app.jwt.secret=ardtechlabs-secret-key-change-in-production-minimum-256-bits-long-key
app.jwt.expiration-ms=86400000

# Admin defaults
app.admin.email=admin@ardtechlabs.com
app.admin.password=admin123

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,https://humble-guide-x9vw55rpv5g36pq5-5173.app.github.dev
