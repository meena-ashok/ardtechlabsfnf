services:
  - type: web
    name: api-backend
    env: docker
    repo: https://github.com/meena-ashok/ardtechlabsfnf
    autoDeploy: true
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ardtechlabs-db
          property: connectionString
  - type: web
    name: ardtechlabs-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: "/api/*"
        destination: "https://api-backend-wnyk.onrender.com/api/*"
      - type: rewrite
        source: "/*"
        destination: "/index.html"
databases:
  - name: ardtechlabs-db
    plan: free
